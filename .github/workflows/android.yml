name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5  # 升级到v5，适配Node.js 24
      
    - name: Set up JDK 11
      uses: actions/setup-java@v5  # 升级到v5，适配Node.js 24
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'gradle'

    # 修复国内网络依赖下载超时
    - name: Configure Maven Mirror
      run: |
        # 优化Gradle参数
        echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "kotlin.code.style=official" >> gradle.properties
        echo "android.nonTransitiveRClass=true" >> gradle.properties
        
        # 替换项目仓库为阿里云镜像（适配KTS格式）
        if [ -f "build.gradle.kts" ]; then
          sed -i 's/google()/maven { url "https://maven.aliyun.com/repository/google" }\n        google()/g' build.gradle.kts
          sed -i 's/mavenCentral()/maven { url "https://maven.aliyun.com/repository/central" }\n        mavenCentral()/g' build.gradle.kts
        fi
        if [ -f "settings.gradle.kts" ]; then
          sed -i 's/gradlePluginPortal()/maven { url "https://maven.aliyun.com/repository/gradle-plugin" }\n        gradlePluginPortal()/g' settings.gradle.kts
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug -x test -x lint

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: app/build/outputs/apk/debug/app-debug.apk
